services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-CrmMundoVs}
      MARIADB_USER: ${MARIADB_USER:-zenith_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-zenith-app-pass-2026}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-zenith-root-pass-2026}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - mundovs-network
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mundovs:
    build:
      context: .
      dockerfile: MundoVs/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Hosting__Urls: http://+:5130
      ConnectionStrings__ZenithConnection: Server=mariadb;Port=3306;Database=${MARIADB_DATABASE:-CrmMundoVs};User=${MARIADB_USER:-zenith_user};Password=${MARIADB_PASSWORD:-zenith-app-pass-2026};CharSet=utf8mb4;
      Auth__CookieSecurePolicy: Always
      Auth__SameSite: Lax
      Auth__UseHttpsRedirection: false
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft__AspNetCore: Warning
      Bootstrap__SuperAdmin__Email: ${BOOTSTRAP_SUPERADMIN_EMAIL:-}
      Bootstrap__SuperAdmin__Password: ${BOOTSTRAP_SUPERADMIN_PASSWORD:-}
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - mundovs_uploads:/app/wwwroot/uploads
    networks:
      - mundovs-network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mundovs.rule=Host(`arzmec.com.mx`)"
      - "traefik.http.routers.mundovs.entrypoints=websecure"
      - "traefik.http.routers.mundovs.tls=true"
      - "traefik.http.routers.mundovs.tls.certresolver=letsencrypt"
      - "traefik.http.services.mundovs.loadbalancer.server.port=5130"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:5130/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mariadb_data:
  mundovs_uploads:

networks:
  mundovs-network:
    driver: bridge
  dokploy-network:
    external: true
